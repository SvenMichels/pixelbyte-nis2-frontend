<div class="app-container">
  @if (auth.isAuthenticated() && auth.currentUser()) {
    <nav class="app-nav">
      <div class="app-nav__brand">
        <h1>NIS2 Compliance</h1>
        <span class="app-nav__user">{{ auth.currentUser()?.email }}</span>
      </div>
      <div class="app-nav__links">
        <a routerLink="/dashboard" routerLinkActive="active" class="app-nav__link">Dashboard</a>
        <a routerLink="/controls" routerLinkActive="active" class="app-nav__link">Controls</a>
        <a routerLink="/risks" routerLinkActive="active" class="app-nav__link">Risks</a>
      </div>
    </nav>
  }

  <main class="app-main" [class.app-main--full]="!auth.isAuthenticated()">
    <router-outlet />
  </main>
</div>
